name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit-tests:
    name: Unit and Integration (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  e2e-smoke:
    name: E2E Smoke (required)
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress smoke in CI
        run: npm run test:e2e:smoke:ci

  e2e-full:
    name: E2E Full
    runs-on: ubuntu-latest
    needs: e2e-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full Cypress in CI
        run: npm run test:e2e:ci
